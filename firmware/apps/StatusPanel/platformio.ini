; PlatformIO Project Configuration File
; StatusPanel — Composes StatusDashboard + LedRGBController
; Demonstrates external-consumer pattern: composes firmwa../../services + firmware/lib

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
board_build.psram_type = opi
lib_extra_dirs =
    ../../device_drivers
    ../../services
lib_deps =
    olikraus/U8g2

; PlatformIO Project Configuration File — ESP32-S3
; BluetoothApiServer: BLE API server with LED + GPIO control.
;
; Two build environments — select with -e flag:
;   uv run pio run -e esp32-s3-dorhea                     # build DORHEA Mini
;   uv run pio run -e esp32-s3-dorhea --target upload
;   uv run pio run -e esp32-s3-devkitc-1                  # build DevKitC-1
;   uv run pio run -e esp32-s3-devkitc-1 --target upload
;   uv run pio run -e esp32-s3-devkitc-1 --target upload --target monitor
;   uv run pio run                                        # build both
;
; Flash over USB-C — native USB serial on GPIO19/20.
;
; Test:
;   uv run python test_api_ble.py
;   uv run python test_api_ble.py --config "pin=4:out"
;   uv run python test_api_ble.py --set 4:1
;   uv run python test_api_ble.py --get 7
;   uv run python test_api_ble.py --led red

; ── DORHEA ESP32-S3 Mini (4 MB Flash, 2 MB PSRAM, NeoPixel GPIO 21 NEO_RGB) ──
[env:esp32-s3-dorhea]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
lib_extra_dirs = ../../services
    ../../device_drivers
lib_deps = adafruit/Adafruit NeoPixel@^1.12.4

board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.psram_type = opi
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDORHEA_BOARD

; ── Espressif ESP32-S3-DevKitC-1 (8 MB Flash, 8 MB PSRAM, NeoPixel GPIO 48 NEO_GRB) ──
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
lib_extra_dirs = ../../services
    ../../device_drivers
lib_deps = adafruit/Adafruit NeoPixel@^1.12.4

board_build.psram_type = opi
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1

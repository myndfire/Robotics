; PlatformIO Project Configuration File — ESP32-S3 CAM Dev Kit
; CameraWebServer: WiFi-connected web server with snapshot + MJPEG streaming.
;
; ESP32-S3 CAM Dev Kit (8 MB PSRAM OPI + 8 MB Flash QIO).
; Uses tzapu/WiFiManager for captive-portal WiFi setup.
; CameraController handles camera pins via NULLLAB_ESP32S3_CAM preset.
;
; Flash over USB-C — no GPIO 0 strapping required.
;
; Run:  uv run pio run --target upload
;       uv run pio run --target upload --target monitor

[env:esp32-s3-cam]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
lib_extra_dirs = ../../services
    ../../device_drivers
lib_deps = tzapu/WiFiManager

board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi

board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = default_8MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
